<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>튜링 테스트 게임</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="container">
    <h1>튜링 테스트 게임</h1>
    <p>학생은 먼저 접속 후 대기합니다. 교사가 매칭을 시작하면 채팅이 열립니다.</p>

    {% if accepting_joins %}
      <form action="/join" method="post" class="card">
        <label for="name">이름</label>
        <input id="name" name="name" placeholder="이름 입력" required />
        <button type="submit">접속하기</button>
      </form>
    {% else %}
      <div class="card">
        <strong>현재 접속 대기 상태가 닫혀 있습니다.</strong>
        <p>교사가 다시 열어야 학생이 접속할 수 있습니다.</p>
      </div>
    {% endif %}
  </main>
</body>
</html>
