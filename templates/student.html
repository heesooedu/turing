<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학생 채팅</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="container">
    <h1>학생 채팅방</h1>
    <p>상대는 익명입니다. 대화 후 판정을 제출하세요.</p>

    <section id="messages" class="chat card"></section>

    <div class="card row">
      <input id="msg" placeholder="메시지를 입력하세요" />
      <button onclick="sendMessage()">전송</button>
    </div>

    <section class="card">
      <h3>판정 제출</h3>
      <div class="row">
        <select id="guess">
          <option value="ai">AI 같다</option>
          <option value="human">사람 같다</option>
        </select>
        <input id="reason" placeholder="근거(1~2문장)" />
        <button onclick="submitJudgment()">제출</button>
      </div>
      <p id="status"></p>
    </section>
  </main>

  <script>
    const box = document.getElementById('messages');

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.innerText = text;
      return div.innerHTML;
    }

    async function refresh() {
      const res = await fetch('/api/messages');
      const data = await res.json();
      box.innerHTML = data.messages.map(m =>
        `<div class="msg ${m.role}"><strong>${m.role === 'student' ? '나' : '상대'}:</strong> ${escapeHtml(m.text)}</div>`
      ).join('');
      box.scrollTop = box.scrollHeight;
      if (!data.round_open) {
        document.getElementById('status').innerText = '라운드가 종료되었습니다. 판정을 제출하세요.';
      }
    }

    async function sendMessage() {
      const input = document.getElementById('msg');
      const text = input.value.trim();
      if (!text) return;
      await fetch('/api/send', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text}),
      });
      input.value = '';
      await refresh();
    }

    async function submitJudgment() {
      const guess = document.getElementById('guess').value;
      const reason = document.getElementById('reason').value;
      const res = await fetch('/api/judgment', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({guess, reason}),
      });
      document.getElementById('status').innerText = res.ok ? '판정이 제출되었습니다.' : '제출에 실패했습니다.';
    }

    refresh();
    setInterval(refresh, 2000);
  </script>
</body>
</html>
