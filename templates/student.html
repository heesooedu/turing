<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학생 채팅</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="container">
    <h1>{{ participant.name }}님의 채팅방</h1>
    <p id="meta">매칭 중...</p>

    <section id="waiting" class="card">
      <strong>학생-학생 매칭을 기다리는 중입니다.</strong>
      <p id="waitingOrder"></p>
    </section>

    <section id="chatCard" class="hidden">
      <section id="messages" class="chat card"></section>

      <div class="card row">
        <input id="msg" placeholder="메시지를 입력하세요" />
        <button id="sendBtn" onclick="sendMessage()">전송</button>
      </div>

      <section class="card">
        <h3>판정 제출</h3>
        <div class="row">
          <select id="guess">
            <option value="ai">AI 같다</option>
            <option value="student">학생 같다</option>
          </select>
          <input id="reason" placeholder="근거(1~2문장)" />
          <button onclick="submitJudgment()">제출</button>
        </div>
        <p id="status"></p>
      </section>
    </section>
  </main>

  <script>
    const box = document.getElementById('messages');

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.innerText = text;
      return div.innerHTML;
    }

    function setMatchedUi(matched) {
      document.getElementById('waiting').style.display = matched ? 'none' : 'block';
      document.getElementById('chatCard').classList.toggle('hidden', !matched);
    }

    async function refresh() {
      const res = await fetch('/api/messages');
      const data = await res.json();

      if (!data.matched) {
        setMatchedUi(false);
        document.getElementById('meta').innerText = '매칭 대기 중';
        const order = data.waiting_order ? `${data.waiting_order}번째 순서입니다.` : '다른 상대를 찾는 중입니다.';
        document.getElementById('waitingOrder').innerText = order;
        return;
      }

      setMatchedUi(true);
      const label = data.match_type === 'ai' ? '학생-AI 매칭' : '학생-학생 매칭';
      document.getElementById('meta').innerText = `${label} · 상대: ${data.peer_name}`;

      box.innerHTML = data.messages.map(m =>
        `<div class="msg ${m.role}"><strong>${m.role === 'self' ? '나' : '상대'}:</strong> ${escapeHtml(m.text)}</div>`
      ).join('');
      box.scrollTop = box.scrollHeight;

      if (data.my_judgment) {
        document.getElementById('status').innerText = `이미 제출됨: ${data.my_judgment.guess}`;
      }
      if (!data.round_open) {
        document.getElementById('sendBtn').disabled = true;
      }
    }

    async function sendMessage() {
      const input = document.getElementById('msg');
      const text = input.value.trim();
      if (!text) return;
      const res = await fetch('/api/send', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text}),
      });
      if (!res.ok) {
        document.getElementById('status').innerText = '전송 실패(매칭/라운드 상태 확인)';
        return;
      }
      input.value = '';
      await refresh();
    }

    async function submitJudgment() {
      const guess = document.getElementById('guess').value;
      const reason = document.getElementById('reason').value;
      const res = await fetch('/api/judgment', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({guess, reason}),
      });
      document.getElementById('status').innerText = res.ok ? '판정이 제출되었습니다.' : '제출에 실패했습니다.';
    }

    refresh();
    setInterval(refresh, 2000);
  </script>
</body>
</html>
